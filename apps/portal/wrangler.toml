name = "obx-portal"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Non-secret env vars baked into the deployment.
# SANITY_WRITE_TOKEN is a secret — set with:
#   wrangler pages secret put SANITY_WRITE_TOKEN --project-name=obx-portal
[vars]
NEXT_PUBLIC_SANITY_PROJECT_ID = "ka9se3h4"
NEXT_PUBLIC_SANITY_DATASET = "production"
NEXT_PUBLIC_SANITY_API_VERSION = "2026-05-14"
